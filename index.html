<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🔐 SecureChat – E2E Encrypted</title>

    <!-- PWA manifest (optional) -->
    <link rel="manifest" href="manifest.json" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #e4e9f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== APP CONTAINER ===== */
        .app {
            width: 100%;
            max-width: 1300px;
            height: 100vh;
            max-height: 900px;
            margin: 1rem;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== JOIN SCREEN ===== */
        .join-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            background: linear-gradient(145deg, #ffffff 0%, #f2f5f9 100%);
        }

        .join-card {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 28px;
            padding: 2.8rem 2.2rem 2rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .join-card .logo {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .join-card .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0084ff 0%, #00c4a7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .join-card .logo p {
            color: #8899aa;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        .join-card .form-group {
            margin-bottom: 1.4rem;
        }

        .join-card label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c3e50;
            margin-bottom: 0.4rem;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        .input-row input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: border 0.2s, box-shadow 0.2s;
            background: #fafbfc;
        }

        .input-row input:focus {
            outline: none;
            border-color: #0084ff;
            box-shadow: 0 0 0 4px rgba(0, 132, 255, 0.10);
            background: #fff;
        }

        .input-row .btn-secondary {
            padding: 0.8rem 1.2rem;
            background: #eef2f6;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c3e50;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .input-row .btn-secondary:hover {
            background: #e2e8f0;
        }

        .input-row .btn-secondary:active {
            transform: scale(0.97);
        }

        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #0084ff 0%, #00c4a7 100%);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            margin-top: 0.5rem;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(0, 132, 255, 0.30);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .error-box {
            background: #fee9e7;
            color: #c62828;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            border-left: 4px solid #c62828;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        .join-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eef2f6;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .join-footer span {
            font-size: 0.8rem;
            color: #8899aa;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .join-footer span .icon {
            font-size: 1.1rem;
        }

        /* ===== CHAT SCREEN ===== */
        .chat-screen {
            display: none;
            flex: 1;
            height: 100%;
            flex-direction: row;
            background: #fff;
        }

        .chat-screen.active {
            display: flex;
        }

        /* --- SIDEBAR (Telegram-style) --- */
        .sidebar {
            width: 280px;
            min-width: 240px;
            background: #f8fafc;
            border-right: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.6rem 1.25rem 0.9rem;
            background: linear-gradient(135deg, #0084ff 0%, #00c4a7 100%);
            color: #fff;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 0.1rem;
        }

        .sidebar-section {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #eef2f6;
        }

        .sidebar-section h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8899aa;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .room-code-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .room-code-box code {
            flex: 1;
            background: #eef2f6;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            color: #0084ff;
            font-weight: 600;
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .room-code-box .copy-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .room-code-box .copy-btn:hover {
            background: #e2e8f0;
        }

        .user-badge {
            background: linear-gradient(135deg, #0084ff 0%, #00c4a7 100%);
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            word-break: break-word;
        }

        .members-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 180px;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.75rem;
            background: #fff;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #eef2f6;
            color: #2c3e50;
        }

        .member-item.own {
            background: #e8f4ff;
            border-color: #0084ff;
            color: #0084ff;
            font-weight: 600;
        }

        .member-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            flex-shrink: 0;
        }

        .member-item .badge {
            margin-left: auto;
            background: #0084ff;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .sidebar-status {
            padding: 1rem 1.25rem;
            margin-top: auto;
            border-top: 1px solid #eef2f6;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.9rem;
            border-radius: 10px;
            background: #fff;
            border: 2px solid #eef2f6;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
        }

        .status-row .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-row.connected {
            border-color: #4caf50;
            color: #4caf50;
        }
        .status-row.connected .dot {
            background: #4caf50;
        }

        .status-row.disconnected {
            border-color: #ef5350;
            color: #ef5350;
        }
        .status-row.disconnected .dot {
            background: #ef5350;
        }

        .btn-leave {
            width: 100%;
            padding: 0.7rem;
            background: #ef5350;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-leave:hover {
            background: #d32f2f;
        }

        .btn-leave:active {
            transform: scale(0.98);
        }

        /* --- MAIN CHAT (WhatsApp-style bubbles) --- */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
            min-width: 0;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            background: #f0f2f5;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #99aabb;
            text-align: center;
        }

        .empty-state .icon {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 0.8rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .msg-row {
            display: flex;
            animation: fadeUp 0.25s ease-out;
        }

        .msg-row.own {
            justify-content: flex-end;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bubble {
            max-width: 70%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        /* Other message (WhatsApp style) */
        .msg-bubble.other {
            background: #fff;
            color: #1a2332;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .msg-bubble.other::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 12px;
            border: 8px solid transparent;
            border-right-color: #fff;
            border-left: 0;
        }

        /* Own message (WhatsApp green gradient) */
        .msg-bubble.own {
            background: linear-gradient(135deg, #00c4a7 0%, #00a884 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.own::before {
            content: '';
            position: absolute;
            right: -8px;
            top: 12px;
            border: 8px solid transparent;
            border-left-color: #00c4a7;
            border-right: 0;
        }

        .msg-bubble .sender {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.75;
            margin-bottom: 0.2rem;
        }

        .msg-bubble .text {
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-bubble .time {
            font-size: 0.65rem;
            opacity: 0.65;
            text-align: right;
            margin-top: 0.25rem;
        }

        .msg-bubble.own .time {
            opacity: 0.85;
        }

        .system-msg {
            text-align: center;
            margin: 0.4rem 0;
        }

        .system-msg span {
            display: inline-block;
            background: rgba(0, 0, 0, 0.06);
            color: #667788;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .error-msg {
            background: #fee9e7;
            color: #c62828;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border-left: 4px solid #c62828;
            font-size: 0.85rem;
        }

        /* --- Input bar (Telegram-style) --- */
        .input-bar {
            padding: 0.75rem 1.25rem 1rem;
            border-top: 1px solid #eef2f6;
            background: #fff;
        }

        .input-bar .row {
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        .input-bar textarea {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            transition: border 0.2s, box-shadow 0.2s;
            background: #fafbfc;
            max-height: 100px;
            min-height: 44px;
            line-height: 1.4;
        }

        .input-bar textarea:focus {
            outline: none;
            border-color: #0084ff;
            box-shadow: 0 0 0 4px rgba(0, 132, 255, 0.10);
            background: #fff;
        }

        .input-bar textarea::placeholder {
            color: #bbccdd;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #0084ff 0%, #00c4a7 100%);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0, 132, 255, 0.25);
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 132, 255, 0.35);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== SCROLLBARS ===== */
        .messages-area::-webkit-scrollbar,
        .members-list::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track,
        .members-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb,
        .members-list::-webkit-scrollbar-thumb {
            background: #d0d8e0;
            border-radius: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover,
        .members-list::-webkit-scrollbar-thumb:hover {
            background: #b0bcc8;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .app {
                margin: 0;
                max-height: 100vh;
                border-radius: 0;
                height: 100vh;
            }

            .sidebar {
                width: 220px;
                min-width: 180px;
            }

            .join-card {
                padding: 1.8rem 1.5rem;
            }
        }

        @media (max-width: 640px) {
            .chat-screen {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 170px;
                flex-direction: row;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid #eef2f6;
                flex-wrap: nowrap;
            }

            .sidebar-header {
                display: none;
            }

            .sidebar-section {
                border-bottom: none;
                border-right: 1px solid #eef2f6;
                min-width: 160px;
                flex-shrink: 0;
                padding: 0.8rem 1rem;
            }

            .sidebar-status {
                border-top: none;
                border-right: 1px solid #eef2f6;
                min-width: 140px;
                flex-shrink: 0;
                padding: 0.8rem 1rem;
                margin-top: 0;
            }

            .members-list {
                max-height: 100px;
            }

            .chat-main {
                flex: 1;
                min-height: 0;
            }

            .messages-area {
                padding: 0.8rem 1rem;
            }

            .msg-bubble {
                max-width: 85%;
            }

            .join-card {
                padding: 1.5rem 1.25rem;
            }

            .input-row {
                flex-wrap: wrap;
            }

            .input-row input {
                min-width: 120px;
            }
        }

        @media (max-width: 420px) {
            .app {
                border-radius: 0;
            }

            .join-card .logo h1 {
                font-size: 1.6rem;
            }

            .join-footer {
                gap: 0.8rem;
                flex-direction: column;
                align-items: center;
            }

            .sidebar-section {
                min-width: 130px;
                padding: 0.6rem 0.8rem;
            }

            .sidebar-status {
                min-width: 120px;
                padding: 0.6rem 0.8rem;
            }

            .member-item {
                font-size: 0.75rem;
                padding: 0.3rem 0.5rem;
            }

            .msg-bubble {
                max-width: 92%;
                padding: 0.5rem 0.75rem;
            }

            .msg-bubble .text {
                font-size: 0.85rem;
            }

            .input-bar {
                padding: 0.5rem 0.8rem 0.7rem;
            }

            .input-bar textarea {
                font-size: 0.85rem;
                padding: 0.5rem 0.8rem;
                min-height: 38px;
            }

            .btn-send {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- ===== JOIN SCREEN ===== -->
        <div class="join-screen" id="joinScreen">
            <div class="join-card">
                <div class="logo">
                    <h1>💬 SecureChat</h1>
                    <p>End‑to‑End Encrypted · No Login</p>
                </div>

                <div class="error-box" id="joinError"></div>

                <form id="joinForm">
                    <div class="form-group">
                        <label for="roomId">Room ID</label>
                        <div class="input-row">
                            <input id="roomId" type="text" placeholder="Enter or generate" />
                            <button type="button" class="btn-secondary" id="genRoomBtn">Generate</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="username">Your Name</label>
                        <div class="input-row">
                            <input id="username" type="text" placeholder="Choose a username" />
                            <button type="button" class="btn-secondary" id="genNameBtn">Random</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">✦ Join Room</button>
                </form>

                <div class="join-footer">
                    <span><span class="icon">🔒</span> E2E Encryption</span>
                    <span><span class="icon">🚀</span> Real‑time</span>
                    <span><span class="icon">👤</span> No Sign‑up</span>
                </div>
            </div>
        </div>

        <!-- ===== CHAT SCREEN ===== -->
        <div class="chat-screen" id="chatScreen">

            <!-- SIDEBAR -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>💬 SecureChat</h2>
                    <p>End‑to‑End Encrypted</p>
                </div>

                <div class="sidebar-section">
                    <h4>Room ID</h4>
                    <div class="room-code-box">
                        <code id="roomCodeDisplay">—</code>
                        <button class="copy-btn" id="copyBtn" title="Copy room ID">📋</button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h4>Your ID</h4>
                    <div class="user-badge" id="userBadge">—</div>
                </div>

                <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
                    <h4>Online <span id="onlineCount">(0)</span></h4>
                    <div class="members-list" id="membersList"></div>
                </div>

                <div class="sidebar-status">
                    <div class="status-row disconnected" id="statusRow">
                        <span class="dot"></span>
                        <span id="statusText">Connecting…</span>
                    </div>
                    <button class="btn-leave" id="leaveBtn">✕ Leave Room</button>
                </div>
            </div>

            <!-- MAIN CHAT -->
            <div class="chat-main">
                <div class="messages-area" id="messagesArea">
                    <div class="empty-state" id="emptyState">
                        <div class="icon">💬</div>
                        <p>No messages yet — start the conversation!</p>
                    </div>
                </div>

                <div class="input-bar">
                    <form id="messageForm">
                        <div class="row">
                            <textarea id="messageInput" rows="1" placeholder="Type a message…" disabled></textarea>
                            <button type="submit" class="btn-send" id="sendBtn" disabled>✉</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== LIBS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js">
    </script>

    <script>
        // ============================================================
        //  🔧 CONFIGURATION – Change this for deployment
        // ============================================================
        const SERVER_URL = 'ws://localhost:8080'; // e.g. wss://your-app.railway.app

        // ============================================================
        //  ENCRYPTION
        // ============================================================
        const E = {
            generateKeyPair() {
                const kp = nacl.box.keyPair();
                return {
                    publicKey: nacl.util.encodeBase64(kp.publicKey),
                    secretKey: nacl.util.encodeBase64(kp.secretKey),
                };
            },

            encrypt(message, recipientPub, mySecret) {
                const nonce = nacl.randomBytes(nacl.box.nonceLength);
                const msg = nacl.util.decodeUTF8(message);
                const pub = nacl.util.decodeBase64(recipientPub);
                const sec = nacl.util.decodeBase64(mySecret);
                const box = nacl.box(msg, nonce, pub, sec);
                return {
                    nonce: nacl.util.encodeBase64(nonce),
                    box: nacl.util.encodeBase64(box),
                };
            },

            decrypt(encrypted, senderPub, mySecret) {
                const nonce = nacl.util.decodeBase64(encrypted.nonce);
                const box = nacl.util.decodeBase64(encrypted.box);
                const pub = nacl.util.decodeBase64(senderPub);
                const sec = nacl.util.decodeBase64(mySecret);
                const opened = nacl.box.open(box, nonce, pub, sec);
                if (!opened) throw new Error('Decryption failed');
                return nacl.util.encodeUTF8(opened);
            },

            randomUsername() {
                const adj = ['Swift', 'Bright', 'Silent', 'Bold', 'Clever', 'Happy', 'Brave', 'Genius', 'Quiet', 'Mighty'];
                const noun = ['Tiger', 'Eagle', 'Panda', 'Wolf', 'Lynx', 'Phoenix', 'Dragon', 'Fox', 'Raven', 'Dolphin'];
                return adj[Math.floor(Math.random() * adj.length)] +
                    noun[Math.floor(Math.random() * noun.length)] +
                    Math.floor(Math.random() * 1000);
            }
        };

        // ============================================================
        //  STATE
        // ============================================================
        const state = {
            ws: null,
            room: '',
            username: '',
            pubKey: '',
            secKey: '',
            users: [],
            connected: false,
            reconnectTimer: null,
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = (id) => document.getElementById(id);
        const dom = {
            joinScreen: $('joinScreen'),
            chatScreen: $('chatScreen'),
            joinForm: $('joinForm'),
            roomId: $('roomId'),
            username: $('username'),
            genRoom: $('genRoomBtn'),
            genName: $('genNameBtn'),
            joinError: $('joinError'),
            messages: $('messagesArea'),
            emptyState: $('emptyState'),
            messageForm: $('messageForm'),
            msgInput: $('messageInput'),
            sendBtn: $('sendBtn'),
            roomCode: $('roomCodeDisplay'),
            userBadge: $('userBadge'),
            members: $('membersList'),
            onlineCount: $('onlineCount'),
            statusRow: $('statusRow'),
            statusText: $('statusText'),
            copyBtn: $('copyBtn'),
            leaveBtn: $('leaveBtn'),
        };

        // ============================================================
        //  HELPERS
        // ============================================================
        function showError(msg) {
            const el = dom.joinError;
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            dom.joinError.classList.remove('show');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function timeStr(d) {
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            const area = dom.messages;
            area.scrollTop = area.scrollHeight;
        }

        // ============================================================
        //  UI UPDATES
        // ============================================================
        function setStatus(connected) {
            state.connected = connected;
            const row = dom.statusRow;
            row.className = 'status-row ' + (connected ? 'connected' : 'disconnected');
            dom.statusText.textContent = connected ? 'Connected' : 'Disconnected';
            dom.msgInput.disabled = !connected;
            dom.sendBtn.disabled = !connected;
            if (!connected) {
                dom.msgInput.placeholder = '⚠️ Not connected – check server';
            } else {
                dom.msgInput.placeholder = 'Type a message…';
            }
        }

        function updateMembers() {
            const list = dom.members;
            const own = state.username;
            const users = state.users.filter(u => u.username !== own);

            let html = `
                <div class="member-item own">
                    <span class="dot"></span>
                    <span>${escapeHtml(own)}</span>
                    <span class="badge">You</span>
                </div>
            `;

            for (const u of users) {
                html += `
                    <div class="member-item">
                        <span class="dot"></span>
                        <span>${escapeHtml(u.username)}</span>
                    </div>
                `;
            }

            list.innerHTML = html;
            dom.onlineCount.textContent = `(${users.length + 1})`;
        }

        function addMessage(from, content, timestamp, isOwn) {
            const area = dom.messages;
            const empty = area.querySelector('.empty-state');
            if (empty) empty.remove();

            const row = document.createElement('div');
            row.className = 'msg-row' + (isOwn ? ' own' : '');

            const time = timeStr(timestamp);

            row.innerHTML = `
                <div class="msg-bubble ${isOwn ? 'own' : 'other'}">
                    ${!isOwn ? `<div class="sender">${escapeHtml(from)}</div>` : ''}
                    <div class="text">${escapeHtml(content)}</div>
                    <div class="time">${time}</div>
                </div>
            `;

            area.appendChild(row);
            scrollToBottom();
        }

        function addSystem(text) {
            const area = dom.messages;
            const empty = area.querySelector('.empty-state');
            if (empty) empty.remove();

            const row = document.createElement('div');
            row.className = 'system-msg';
            row.innerHTML = `<span>${escapeHtml(text)}</span>`;
            area.appendChild(row);
            scrollToBottom();
        }

        function addError(text) {
            const area = dom.messages;
            const empty = area.querySelector('.empty-state');
            if (empty) empty.remove();

            const row = document.createElement('div');
            row.className = 'error-msg';
            row.textContent = '⚠️ ' + text;
            area.appendChild(row);
            scrollToBottom();
        }

        // ============================================================
        //  WEBSOCKET
        // ============================================================
        function connect(room, username, pubKey, secKey) {
            // Clear any existing reconnect timer
            if (state.reconnectTimer) {
                clearInterval(state.reconnectTimer);
                state.reconnectTimer = null;
            }

            try {
                const ws = new WebSocket(SERVER_URL);
                state.ws = ws;

                ws.onopen = () => {
                    console.log('🔗 WebSocket open');
                    setStatus(true);
                    ws.send(JSON.stringify({
                        type: 'JOIN_ROOM',
                        room,
                        username,
                        publicKey: pubKey,
                    }));
                    // Stop reconnecting if we were trying
                    if (state.reconnectTimer) {
                        clearInterval(state.reconnectTimer);
                        state.reconnectTimer = null;
                    }
                };

                ws.onmessage = (ev) => {
                    try {
                        const data = JSON.parse(ev.data);
                        handleServerMessage(data);
                    } catch (e) {
                        console.warn('Parse error:', e);
                    }
                };

                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                    setStatus(false);
                };

                ws.onclose = () => {
                    console.log('🔌 WebSocket closed');
                    setStatus(false);
                    // Attempt reconnect after 3 seconds
                    if (!state.reconnectTimer) {
                        state.reconnectTimer = setInterval(() => {
                            console.log('🔄 Reconnecting...');
                            connect(room, username, pubKey, secKey);
                        }, 3000);
                    }
                };

            } catch (err) {
                console.error('Connection error:', err);
                showError('Failed to connect to server. Is it running?');
                setStatus(false);
                // Also attempt reconnect
                if (!state.reconnectTimer) {
                    state.reconnectTimer = setInterval(() => {
                        console.log('🔄 Reconnecting...');
                        connect(room, username, pubKey, secKey);
                    }, 3000);
                }
            }
        }

        function sendToServer(msg) {
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
                state.ws.send(JSON.stringify(msg));
            } else {
                addError('Not connected to server');
            }
        }

        function requestUsers() {
            sendToServer({ type: 'GET_USERS' });
        }

        // ============================================================
        //  HANDLE SERVER MESSAGES
        // ============================================================
        function handleServerMessage(data) {
            switch (data.type) {

                case 'JOINED':
                    setStatus(true);
                    console.log('✅ Joined room:', data.room);
                    requestUsers();
                    break;

                case 'USER_JOINED':
                    addSystem(`${data.username} joined (${data.totalUsers} users)`);
                    requestUsers();
                    break;

                case 'USER_LEFT':
                    addSystem(`${data.username} left (${data.totalUsers} users)`);
                    requestUsers();
                    break;

                case 'USERS_LIST':
                    state.users = data.users || [];
                    updateMembers();
                    break;

                case 'MESSAGE': {
                    try {
                        let decrypted;
                        const isOwn = data.from === state.username;
                        if (isOwn) {
                            decrypted = data.encryptedMessage;
                        } else {
                            decrypted = E.decrypt(
                                data.encryptedMessage,
                                data.fromPublicKey,
                                state.secKey
                            );
                        }
                        addMessage(data.from, decrypted, new Date(data.timestamp), isOwn);
                    } catch (err) {
                        console.error('Decrypt error:', err);
                        addError(`Failed to decrypt message from ${data.from}`);
                    }
                    break;
                }

                case 'ERROR':
                    console.warn('Server error:', data.message);
                    addError('Server: ' + data.message);
                    break;

                default:
                    console.log('Unknown message type:', data.type);
            }
        }

        // ============================================================
        //  SEND MESSAGE
        // ============================================================
        function sendMessage(text) {
            if (!state.connected) {
                addError('You are offline. Please wait for reconnection.');
                return;
            }

            try {
                // encrypt for self (so we can display it)
                const encrypted = E.encrypt(text, state.pubKey, state.secKey);

                sendToServer({
                    type: 'SEND_MESSAGE',
                    room: state.room,
                    encryptedMessage: encrypted,
                    recipientPublicKey: state.pubKey,
                });

                // optimistic display
                addMessage(state.username, text, new Date(), true);

            } catch (err) {
                console.error('Send error:', err);
                addError('Failed to send message');
            }
        }

        // ============================================================
        //  JOIN / LEAVE
        // ============================================================
        function joinRoom(room, username) {
            hideError();

            if (!room.trim()) { showError('Please enter a room ID'); return; }
            if (!username.trim()) { showError('Please enter a username'); return; }

            try {
                const kp = E.generateKeyPair();
                state.pubKey = kp.publicKey;
                state.secKey = kp.secretKey;

                // switch UI
                dom.joinScreen.style.display = 'none';
                dom.chatScreen.classList.add('active');
                dom.roomCode.textContent = room;
                dom.userBadge.textContent = username;

                connect(room, username, kp.publicKey, kp.secretKey);

            } catch (err) {
                console.error(err);
                showError('Failed to generate encryption keys');
            }
        }

        function leaveRoom() {
            if (state.reconnectTimer) {
                clearInterval(state.reconnectTimer);
                state.reconnectTimer = null;
            }
            if (state.ws) {
                try { state.ws.close(); } catch (_) {}
            }

            // reset state
            state.ws = null;
            state.room = '';
            state.username = '';
            state.pubKey = '';
            state.secKey = '';
            state.users = [];
            state.connected = false;

            // reset UI
            dom.chatScreen.classList.remove('active');
            dom.joinScreen.style.display = 'flex';
            dom.messages.innerHTML = `<div class="empty-state" id="emptyState">
                <div class="icon">💬</div>
                <p>No messages yet — start the conversation!</p>
            </div>`;
            dom.msgInput.value = '';
            setStatus(false);
            dom.members.innerHTML = '';
            dom.onlineCount.textContent = '(0)';
            dom.roomCode.textContent = '—';
            dom.userBadge.textContent = '—';
            dom.joinForm.reset();
            dom.username.value = E.randomUsername();
        }

        // ============================================================
        //  EVENT BINDING
        // ============================================================
        dom.genRoom.addEventListener('click', () => {
            dom.roomId.value = 'room-' + Math.random().toString(36).substr(2, 9);
        });

        dom.genName.addEventListener('click', () => {
            dom.username.value = E.randomUsername();
        });

        dom.joinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const room = dom.roomId.value.trim();
            const user = dom.username.value.trim();
            joinRoom(room, user);
        });

        dom.messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = dom.msgInput.value.trim();
            if (text && state.connected) {
                sendMessage(text);
                dom.msgInput.value = '';
                dom.msgInput.style.height = 'auto';
            }
        });

        dom.msgInput.addEventListener('input', () => {
            dom.msgInput.style.height = 'auto';
            dom.msgInput.style.height = Math.min(dom.msgInput.scrollHeight, 100) + 'px';
        });

        dom.copyBtn.addEventListener('click', () => {
            const text = dom.roomCode.textContent;
            if (text && text !== '—') {
                navigator.clipboard.writeText(text).then(() => {
                    const orig = dom.copyBtn.textContent;
                    dom.copyBtn.textContent = '✅';
                    setTimeout(() => { dom.copyBtn.textContent = orig; }, 1500);
                }).catch(() => {
                    const area = document.createElement('textarea');
                    area.value = text;
                    document.body.appendChild(area);
                    area.select();
                    document.execCommand('copy');
                    area.remove();
                    alert('Room ID copied!');
                });
            }
        });

        dom.leaveBtn.addEventListener('click', leaveRoom);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && dom.chatScreen.classList.contains('active')) {
                if (confirm('Leave the room?')) leaveRoom();
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        dom.username.value = E.randomUsername();
        dom.roomId.value = 'room-' + Math.random().toString(36).substr(2, 9);

        console.log('🔐 SecureChat ready');
        console.log(`ℹ️  Server URL: ${SERVER_URL}`);
        console.log('   Make sure the server is running and reachable.');
    </script>

</body>
</html>
